name: build e test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
jobs:
  build-e-teste:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          
      - name: Restore
        run: dotnet restore back
        
      - name: Build
        run: dotnet build back --no-restore -v q
        
      - name: Test
        run: dotnet test back --no-build -v q
